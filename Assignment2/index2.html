<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <h1>☀️ Async Weather Tracker</h1>

    <div class="top-container">

        <!-- Search Section -->
        <div class="card">
            <h3>Search City</h3>

            <form id="form">
                <input type="text" id="search-city" placeholder="Enter city">
                <button type="submit">Search</button>
            </form>

            <h3 class="history-title">Search History</h3>
            <div id="search-history"></div>
        </div>


        <!-- Weather Info -->
        <div class="card">
            <h3>Weather Info</h3>
            <div id="fetched-data-container">
                <p class="error">City not found</p>
            </div>
        </div>

    </div>


    <!-- Console -->
    <div class="console-card">

        <h3>Console – Event Loop</h3>

        <div id="console">
            <p> Sync Start</p>
            <p> Sync End</p>
            <p> [ASYNC] Start fetching</p>
            <p> Promise.then (Microtask)</p>
            <p> setTimeout (Macrotask)</p>
        </div>

    </div>


    <script>

        let apiKey = "7bcd6a1d1b053bea6202f7d9029663fd"

        let form = document.querySelector("#form")
        let city = document.querySelector("#search-city")
        let weather = document.querySelector("#fetched-data-container")
        let searchCities = document.querySelector("#search-history")


        async function getWeatherInfo(cityName) {

            console.log("Sync Start")

            try {

                let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${apiKey}&units=metric`)

                let data = await response.json()

                console.log("Data received")

                if (data.cod !== 200) {
                    weather.innerHTML = `<p class="error">City not found</p>`
                    return
                }

                weather.innerHTML = `
<div class="row">
<span>City</span>
<span>${data.name}, ${data.sys.country}</span>
</div>

<div class="row">
<span>Temp</span>
<span>${data.main.temp} °C</span>
</div>

<div class="row">
<span>Weather</span>
<span>${data.weather[0].main}</span>
</div>

<div class="row">
<span>Humidity</span>
<span>${data.main.humidity}%</span>
</div>

<div class="row">
<span>Wind</span>
<span>${data.wind.speed} m/s</span>
</div>
`

                let cities = JSON.parse(localStorage.getItem("cities")) || []

                if (!cities.includes(cityName)) {
                    cities.push(cityName)
                    localStorage.setItem("cities", JSON.stringify(cities))
                }

                displaySearchHistory()

            } catch (error) {
                weather.innerHTML = `<p class="error">City not found</p>`
            }

        }


        function displaySearchHistory() {

            let cities = JSON.parse(localStorage.getItem("cities")) || []

            searchCities.innerHTML = ""

            cities.forEach(city => {

                let button = document.createElement("button")

                button.textContent = city

                button.addEventListener("click", () => getWeatherInfo(city))

                searchCities.append(button)

            })

        }


        displaySearchHistory()


        form.addEventListener("submit", (event) => {

            event.preventDefault()

            getWeatherInfo(city.value)

        })

    </script>

</body>

</html>
